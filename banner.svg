<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="phone1bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a6fb5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="phone2bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="phone3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="indigoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b4fe8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="screen1">
      <rect x="0" y="0" width="166" height="330" rx="8"/>
    </clipPath>
    <clipPath id="screen2">
      <rect x="0" y="0" width="166" height="330" rx="8"/>
    </clipPath>
    <clipPath id="screen3">
      <rect x="0" y="0" width="166" height="330" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg3)"/>

  <!-- Subtle radial pattern -->
  <circle cx="640" cy="400" r="400" fill="#5b4fe8" opacity="0.025" filter="url(#glow3)"/>
  <circle cx="350" cy="400" r="200" fill="#0ea5e9" opacity="0.02"/>
  <circle cx="930" cy="400" r="200" fill="#22c55e" opacity="0.02"/>

  <!-- Title -->
  <text x="640" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">screenshotter</text>

  <!-- Accent underline -->
  <rect x="490" y="118" width="300" height="4" rx="2" fill="url(#indigoAccent)"/>

  <!-- Subtitle -->
  <text x="640" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#8a8aaa" letter-spacing="0.3">App Store &amp; Play Store ready screenshots in minutes</text>

  <!-- Phone 1 - Ocean Blue -->
  <g transform="translate(280, 200)" filter="url(#phoneShadow)">
    <!-- Phone frame -->
    <rect x="-10" y="-10" width="190" height="400" rx="24" fill="#1a1a2e" stroke="#2a2a48" stroke-width="1.5"/>
    <!-- Notch -->
    <rect x="55" y="-4" width="60" height="16" rx="8" fill="#0f0a1a"/>
    <!-- Screen area with gradient bg -->
    <g transform="translate(2, 20)">
      <rect width="166" height="330" rx="8" fill="url(#phone1bg)"/>
      <!-- App mockup content -->
      <rect x="20" y="30" width="126" height="14" rx="4" fill="white" opacity="0.9"/>
      <rect x="20" y="52" width="90" height="8" rx="3" fill="white" opacity="0.4"/>
      <!-- Card element -->
      <rect x="16" y="80" width="134" height="80" rx="10" fill="white" opacity="0.2"/>
      <rect x="28" y="94" width="80" height="8" rx="3" fill="white" opacity="0.6"/>
      <rect x="28" y="108" width="110" height="6" rx="3" fill="white" opacity="0.3"/>
      <rect x="28" y="120" width="60" height="6" rx="3" fill="white" opacity="0.3"/>
      <rect x="28" y="138" width="50" height="16" rx="8" fill="white" opacity="0.5"/>
      <!-- Another card -->
      <rect x="16" y="174" width="134" height="60" rx="10" fill="white" opacity="0.15"/>
      <rect x="28" y="188" width="70" height="8" rx="3" fill="white" opacity="0.5"/>
      <rect x="28" y="202" width="100" height="6" rx="3" fill="white" opacity="0.25"/>
      <!-- Bottom nav -->
      <rect x="0" y="290" width="166" height="40" rx="0" fill="white" opacity="0.1"/>
      <circle cx="35" cy="310" r="8" fill="white" opacity="0.4"/>
      <circle cx="83" cy="310" r="8" fill="white" opacity="0.4"/>
      <circle cx="131" cy="310" r="8" fill="white" opacity="0.4"/>
    </g>
    <!-- Caption area below phone -->
    <text x="85" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a8ab5" font-weight="600">Discover nearby</text>
    <text x="85" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4a5a7a">Find what matters most</text>
  </g>

  <!-- Phone 2 - Sunset Orange (center, slightly larger) -->
  <g transform="translate(530, 185)" filter="url(#phoneShadow)">
    <rect x="-10" y="-10" width="200" height="420" rx="26" fill="#1a1a2e" stroke="#3a3a58" stroke-width="1.5"/>
    <rect x="58" y="-4" width="64" height="16" rx="8" fill="#0f0a1a"/>
    <g transform="translate(2, 20)">
      <rect width="176" height="350" rx="8" fill="url(#phone2bg)"/>
      <!-- App mockup content -->
      <circle cx="88" cy="60" r="30" fill="white" opacity="0.25"/>
      <circle cx="88" cy="60" r="18" fill="white" opacity="0.15"/>
      <rect x="48" y="100" width="80" height="12" rx="4" fill="white" opacity="0.8"/>
      <rect x="38" y="120" width="100" height="8" rx="3" fill="white" opacity="0.35"/>
      <!-- Stats row -->
      <g transform="translate(16, 150)">
        <rect width="42" height="50" rx="8" fill="white" opacity="0.2"/>
        <text x="21" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.8">24</text>
        <text x="21" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="white" opacity="0.5">posts</text>
      </g>
      <g transform="translate(66, 150)">
        <rect width="42" height="50" rx="8" fill="white" opacity="0.2"/>
        <text x="21" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.8">1.2k</text>
        <text x="21" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="white" opacity="0.5">followers</text>
      </g>
      <g transform="translate(116, 150)">
        <rect width="42" height="50" rx="8" fill="white" opacity="0.2"/>
        <text x="21" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" opacity="0.8">89</text>
        <text x="21" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="white" opacity="0.5">following</text>
      </g>
      <!-- Grid of images -->
      <rect x="8" y="216" width="50" height="50" rx="4" fill="white" opacity="0.2"/>
      <rect x="63" y="216" width="50" height="50" rx="4" fill="white" opacity="0.15"/>
      <rect x="118" y="216" width="50" height="50" rx="4" fill="white" opacity="0.2"/>
      <rect x="8" y="272" width="50" height="50" rx="4" fill="white" opacity="0.15"/>
      <rect x="63" y="272" width="50" height="50" rx="4" fill="white" opacity="0.2"/>
      <rect x="118" y="272" width="50" height="50" rx="4" fill="white" opacity="0.15"/>
    </g>
    <text x="90" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c58a30" font-weight="600">Your profile, your way</text>
    <text x="90" y="456" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6a5a4a">Express yourself freely</text>
  </g>

  <!-- Phone 3 - Forest Green -->
  <g transform="translate(810, 200)" filter="url(#phoneShadow)">
    <rect x="-10" y="-10" width="190" height="400" rx="24" fill="#1a1a2e" stroke="#2a2a48" stroke-width="1.5"/>
    <rect x="55" y="-4" width="60" height="16" rx="8" fill="#0f0a1a"/>
    <g transform="translate(2, 20)">
      <rect width="166" height="330" rx="8" fill="url(#phone3bg)"/>
      <!-- Chat interface mockup -->
      <rect x="10" y="20" width="100" height="8" rx="3" fill="white" opacity="0.7"/>
      <rect x="10" y="34" width="60" height="6" rx="3" fill="white" opacity="0.3"/>
      <!-- Chat bubbles -->
      <rect x="10" y="60" width="100" height="32" rx="12" fill="white" opacity="0.2"/>
      <rect x="18" y="70" width="80" height="6" rx="3" fill="white" opacity="0.5"/>
      <rect x="18" y="80" width="50" height="6" rx="3" fill="white" opacity="0.3"/>

      <rect x="56" y="104" width="100" height="42" rx="12" fill="white" opacity="0.3"/>
      <rect x="64" y="114" width="80" height="6" rx="3" fill="white" opacity="0.5"/>
      <rect x="64" y="126" width="70" height="6" rx="3" fill="white" opacity="0.4"/>
      <rect x="64" y="138" width="40" height="4" rx="2" fill="white" opacity="0.2"/>

      <rect x="10" y="158" width="90" height="32" rx="12" fill="white" opacity="0.2"/>
      <rect x="18" y="168" width="70" height="6" rx="3" fill="white" opacity="0.5"/>
      <rect x="18" y="180" width="40" height="6" rx="3" fill="white" opacity="0.3"/>

      <rect x="46" y="202" width="110" height="52" rx="12" fill="white" opacity="0.25"/>
      <rect x="54" y="212" width="90" height="6" rx="3" fill="white" opacity="0.5"/>
      <rect x="54" y="224" width="80" height="6" rx="3" fill="white" opacity="0.4"/>
      <rect x="54" y="236" width="60" height="6" rx="3" fill="white" opacity="0.3"/>

      <!-- Input bar -->
      <rect x="8" y="290" width="120" height="30" rx="15" fill="white" opacity="0.15" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
      <circle cx="148" cy="305" r="13" fill="white" opacity="0.3"/>
    </g>
    <text x="85" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#3a9a5a" font-weight="600">Stay connected</text>
    <text x="85" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4a6a5a">Chat that feels natural</text>
  </g>

  <!-- Feature badges at bottom -->
  <g transform="translate(420, 600)">
    <rect width="90" height="26" rx="13" fill="#1a1a30" stroke="#5b4fe8" stroke-width="1"/>
    <text x="45" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b4fe8">6.5" / 5.5"</text>
  </g>
  <g transform="translate(530, 600)">
    <rect width="80" height="26" rx="13" fill="#1a1a30" stroke="#5b4fe8" stroke-width="1"/>
    <text x="40" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b4fe8">Frames</text>
  </g>
  <g transform="translate(630, 600)">
    <rect width="100" height="26" rx="13" fill="#1a1a30" stroke="#5b4fe8" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b4fe8">Captions</text>
  </g>
  <g transform="translate(750, 600)">
    <rect width="110" height="26" rx="13" fill="#1a1a30" stroke="#5b4fe8" stroke-width="1"/>
    <text x="55" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b4fe8">Bulk Export</text>
  </g>

  <!-- Watermark -->
  <text x="1260" y="625" text-anchor="end" font-family="monospace" font-size="12" fill="#3a3a5a">github.com/Aswin-Dot/screenshotter</text>
</svg>